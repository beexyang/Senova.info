<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Reset your password — Senova</title>
<style>
  :root{ --teal:#0D9488; --teal-dark:#0F766E; --navy:#0F172A; --gray:#64748B;
    --border:#E2E8F0; --bg:#F8FAFC; --ok:#16A34A; --danger:#DC2626; }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--bg);color:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:36px;max-width:440px;width:100%;
    box-shadow:0 1px 3px rgba(0,0,0,.05)}
  h1{margin:0 0 8px;font-size:22px}
  p.lead{margin:0 0 24px;color:var(--gray);font-size:14px;line-height:1.5}
  label{display:block;font-size:12px;font-weight:600;color:var(--gray);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.04em}
  input[type=password]{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
  input[type=password]:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
  button{width:100%;margin-top:22px;padding:13px 18px;border:none;border-radius:10px;background:var(--teal);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s}
  button:hover{background:var(--teal-dark)}
  button:disabled{background:#94A3B8;cursor:not-allowed}
  .msg{margin-top:16px;padding:12px 14px;border-radius:10px;font-size:14px;display:none}
  .msg.err{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA;display:block}
  .msg.ok{background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0;display:block}
  .links{margin-top:18px;text-align:center;font-size:13px}
  .links a{color:var(--teal);text-decoration:none;font-weight:600}
  .hint{font-size:12px;color:var(--gray);margin-top:6px}
</style>
</head>
<body>

<div class="card">
  <h1>Reset your password</h1>
  <p class="lead" id="lead">Enter a new password for your Senova account. The link in your email is single-use and expires after a short time.</p>

  <div id="form-block">
    <label for="pw">New password</label>
    <input type="password" id="pw" placeholder="Min 8 characters" autocomplete="new-password"/>
    <div class="hint">Use at least 8 characters. Mix of letters, numbers, and a symbol is best.</div>

    <label for="pw2">Confirm new password</label>
    <input type="password" id="pw2" placeholder="Re-enter the same password" autocomplete="new-password"/>

    <button id="submit">Update password</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="links">
    <a href="/signin">Back to sign in</a>
  </div>
</div>

<script>
// Public anon key. Safe to publish — RLS controls all data access.
const SUPABASE_URL = 'https://nzinorhyoxifmthyvsbb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56aW5vcmh5b3hpZm10aHl2c2JiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTI2MjMsImV4cCI6MjA5MDkyODYyM30._7RjAOyhOISw6Nh3qjt8cwJspQrGe2Zw2aBgWu8u4ro';

const lead = document.getElementById('lead');
const formBlock = document.getElementById('form-block');
const msg = document.getElementById('msg');
const submitBtn = document.getElementById('submit');

function showError(text){ msg.className = 'msg err'; msg.textContent = text; }
function showOk(text){ msg.className = 'msg ok'; msg.textContent = text; }

// Supabase puts the recovery token in the URL hash, e.g.:
// /reset-password#access_token=...&refresh_token=...&expires_in=...&token_type=bearer&type=recovery
function parseHash(){
  const h = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : window.location.hash;
  const out = {};
  for (const part of h.split('&')) {
    const [k, v] = part.split('=');
    if (k) out[decodeURIComponent(k)] = decodeURIComponent(v || '');
  }
  return out;
}

const hashParams = parseHash();
const accessToken = hashParams.access_token;
const refreshToken = hashParams.refresh_token;
const linkType = hashParams.type;
const errorDescription = hashParams.error_description || hashParams.error;

// If Supabase redirected with an error (link expired, already used, etc.) show it cleanly.
if (errorDescription) {
  formBlock.style.display = 'none';
  lead.textContent = 'This reset link is no longer valid: ' + errorDescription.replace(/\+/g, ' ') +
    '. Please request a new password reset email.';
} else if (!accessToken || linkType !== 'recovery') {
  formBlock.style.display = 'none';
  lead.textContent = 'This page should be opened from the link in your password-reset email. ' +
    'If you got here by mistake, request a new reset from the sign-in page.';
}

// Clean the hash from the URL bar so the token isn't visible/bookmarkable.
if (accessToken) {
  history.replaceState(null, '', window.location.pathname);
}

submitBtn.addEventListener('click', async () => {
  msg.style.display = 'none';
  msg.className = 'msg';

  const pw = document.getElementById('pw').value;
  const pw2 = document.getElementById('pw2').value;

  if (!pw || pw.length < 8) return showError('Password must be at least 8 characters.');
  if (pw.length > 200) return showError('Password is too long (max 200 characters).');
  if (pw !== pw2) return showError('Passwords do not match.');
  if (!accessToken) return showError('Recovery token missing. Please use the link in your email.');

  submitBtn.disabled = true; submitBtn.textContent = 'Updating...';

  try {
    // Update the user's password via Supabase Auth using the recovery access token.
    const r = await fetch(SUPABASE_URL + '/auth/v1/user', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + accessToken
      },
      body: JSON.stringify({ password: pw })
    });

    if (!r.ok) {
      let err = 'Could not update password.';
      try { const j = await r.json(); err = j.msg || j.error_description || j.error || err; } catch(_) {}
      throw new Error(err);
    }

    showOk('Password updated. Redirecting you to sign in...');
    submitBtn.textContent = 'Updated';
    // Optional: sign out the recovery session so they re-authenticate cleanly.
    try {
      await fetch(SUPABASE_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + accessToken }
      });
    } catch(_) {}
    setTimeout(() => { window.location.href = '/signin'; }, 1800);
  } catch (e) {
    showError(e.message || 'Something went wrong. Please request a new reset email.');
    submitBtn.disabled = false; submitBtn.textContent = 'Update password';
  }
});
</script>

</body>
</html>
