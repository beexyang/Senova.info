<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset your Senova password</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background:#F8FAFC; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { background:#fff; border:1px solid #E5E7EB; border-radius:12px; padding:36px; width:100%; max-width:440px; box-shadow:0 8px 24px rgba(0,0,0,0.06); }
  .logo { text-align:center; font-family:'Poppins',sans-serif; font-weight:800; font-size:28px; color:#0D9488; margin-bottom:8px; }
  .logo .v { color:#F97316; }
  h1 { font-family:'Poppins',sans-serif; font-size:22px; font-weight:700; color:#202124; text-align:center; margin-bottom:8px; }
  .lead { color:#5F6368; font-size:14px; text-align:center; margin-bottom:24px; line-height:1.5; }
  label { display:block; font-size:13px; font-weight:600; color:#202124; margin-bottom:6px; margin-top:14px; }
  input[type=password] { width:100%; padding:11px 13px; border:1px solid #E5E7EB; border-radius:8px; font-size:14px; font-family:inherit; }
  input[type=password]:focus { outline:none; border-color:#0D9488; box-shadow:0 0 0 3px rgba(13,148,136,0.12); }
  .hint { font-size:12px; color:#9CA3AF; margin-top:6px; }
  button { width:100%; padding:13px; background:#0D9488; color:#fff; border:none; border-radius:8px; font-weight:600; font-size:15px; cursor:pointer; margin-top:20px; }
  button:hover { background:#0B7A6E; }
  button:disabled { background:#9CA3AF; cursor:not-allowed; }
  .msg { margin-top:16px; padding:11px 14px; border-radius:8px; font-size:13px; display:none; }
  .msg.err { background:#FEE2E2; color:#991B1B; border:1px solid #FCA5A5; display:block; }
  .msg.ok { background:#D1FAE5; color:#065F46; border:1px solid #6EE7B7; display:block; }
  .links { text-align:center; margin-top:18px; }
  .links a { color:#0D9488; font-size:13px; text-decoration:none; font-weight:500; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Seno<span class="v">va</span></div>
  <h1>Reset your password</h1>
  <p class="lead" id="lead">Enter and confirm your new password below.</p>

  <div id="form-block">
    <label for="pw">New password</label>
    <input type="password" id="pw" placeholder="At least 12 characters" autocomplete="new-password"/>
    <div class="hint">12+ characters. Avoid common passwords.</div>

    <label for="pw2">Confirm new password</label>
    <input type="password" id="pw2" placeholder="Re-enter the same password" autocomplete="new-password"/>

    <button id="submit">Update password</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="links">
    <a href="/signin">Back to sign in</a>
  </div>
</div>

<script src="/js/reset_password.1.js" defer></script>
</body>
</html>
