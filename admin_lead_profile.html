<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Lead Profile — Senova Admin</title>
<style>
  :root{
    --navy:#0F172A; --teal:#0D9488; --teal-dark:#0F766E; --gray:#64748B;
    --border:#E2E8F0; --bg:#F8FAFC; --warning:#F59E0B; --ok:#16A34A; --danger:#DC2626;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--navy)}
  .topbar{background:#fff;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
  .topbar h1{font-size:18px;margin:0;font-weight:700}
  .topbar a{color:var(--teal);text-decoration:none;font-size:14px;font-weight:600}
  .container{max-width:1100px;margin:24px auto;padding:0 24px}
  .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
  .card h2{margin:0 0 18px 0;font-size:16px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:10px}
  .card h2 .badge{font-size:11px;background:#E0F2FE;color:#075985;padding:3px 8px;border-radius:999px;font-weight:600}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px 32px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px 32px}
  .field{margin:0}
  .field-label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--gray);font-weight:600;margin-bottom:4px}
  .field-value{font-size:15px;color:var(--navy);font-weight:500}
  .status-chip{display:inline-block;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px}
  .status-new{background:#FEF3C7;color:#92400E}
  .status-assigned{background:#DCFCE7;color:#166534}
  .status-awaiting{background:#FEE2E2;color:#991B1B}
  .status-closed{background:#E5E7EB;color:#374151}
  .timeline{border-left:3px solid var(--teal);padding-left:20px;margin-left:8px}
  .timeline-item{position:relative;padding-bottom:18px}
  .timeline-item::before{content:'';position:absolute;left:-27px;top:4px;width:12px;height:12px;background:var(--teal);border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px var(--teal)}
  .timeline-action{font-weight:700;font-size:14px;color:var(--navy);text-transform:capitalize}
  .timeline-desc{font-size:13px;color:var(--gray);margin-top:2px}
  .timeline-meta{font-size:11px;color:var(--gray);margin-top:4px}
  textarea{width:100%;min-height:110px;padding:12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;resize:vertical}
  .btn{background:var(--teal);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600;font-size:14px}
  .btn:hover{background:var(--teal-dark)}
  .btn-outline{background:#fff;color:var(--teal);border:2px solid var(--teal)}
  .empty{color:var(--gray);font-style:italic;padding:20px;text-align:center}
  .toast{position:fixed;top:20px;right:20px;background:var(--ok);color:#fff;padding:12px 20px;border-radius:8px;font-weight:600;opacity:0;transition:opacity .3s}
  .toast.show{opacity:1}
  .follow-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .follow-row input[type=date]{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-family:inherit}
  .follow-row label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px}
  .vendor-link{color:var(--teal);text-decoration:none;font-weight:700}
  .vendor-link:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="topbar">
  <h1>Lead Profile</h1>
  <a href="/admin/crm">&larr; Back to CRM</a>
</div>

<div class="container" id="root">
  <div class="card"><div class="empty">Loading lead&hellip;</div></div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/admin_lead_profile.1.js" defer></script>

</body>
</html>
