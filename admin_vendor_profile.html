<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Vendor Profile — Senova Admin</title>
<style>
  :root{
    --navy:#0F172A; --teal:#0D9488; --teal-dark:#0F766E; --gray:#64748B;
    --border:#E2E8F0; --bg:#F8FAFC; --warning:#F59E0B; --ok:#16A34A; --danger:#DC2626;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--navy)}
  .topbar{background:#fff;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
  .topbar h1{font-size:18px;margin:0;font-weight:700}
  .topbar a{color:var(--teal);text-decoration:none;font-size:14px;font-weight:600}
  .container{max-width:1200px;margin:24px auto;padding:0 24px}
  .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
  .card h2{margin:0 0 18px 0;font-size:16px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:10px}
  .card h2 .badge{font-size:11px;background:#E0F2FE;color:#075985;padding:3px 8px;border-radius:999px;font-weight:600}
  .badge-plan{background:#F3E8FF;color:#6B21A8}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px 32px}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .stat{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
  .stat .n{font-size:24px;font-weight:700;color:var(--navy)}
  .stat .l{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--gray);font-weight:600;margin-top:2px}
  .field-label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--gray);font-weight:600;margin-bottom:4px}
  .field-value{font-size:15px;color:var(--navy);font-weight:500}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
  th{font-size:11px;text-transform:uppercase;color:var(--gray);letter-spacing:.05em;font-weight:700}
  tr:hover td{background:#FAFBFC}
  .status-chip{display:inline-block;font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px}
  .status-new{background:#FEF3C7;color:#92400E}
  .status-assigned{background:#DCFCE7;color:#166534}
  .status-awaiting{background:#FEE2E2;color:#991B1B}
  .status-closed{background:#E5E7EB;color:#374151}
  .status-sent{background:#DBEAFE;color:#1E40AF}
  .lead-link{color:var(--teal);text-decoration:none;font-weight:600}
  .lead-link:hover{text-decoration:underline}
  .empty{color:var(--gray);font-style:italic;padding:20px;text-align:center}
</style>
</head>
<body>

<div class="topbar">
  <h1>Vendor Profile</h1>
  <a href="/admin">&larr; Back to Admin</a>
</div>

<div class="container" id="root">
  <div class="card"><div class="empty">Loading vendor&hellip;</div></div>
</div>

<script src="/js/admin_vendor_profile.1.js" defer></script>

</body>
</html>
